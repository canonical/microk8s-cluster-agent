name: Go Tests

on:
  pull_request:

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: go fmt
        run: make go.fmt

      - name: check diff
        run: |
          if ! git diff; then
            echo "Detected changes that have not been committed to the repository"
            exit 1
          fi

      - name: go vet
        run: make go.vet

      - name: go lint
        run: make go.lint

      - name: go staticcheck
        run: make go.staticcheck

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: make go.test

  deps:
    name: Check go.mod
    runs-on: ubuntu-latest

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Ensure go.mod is up to date
        run: |
          go mod tidy

          git_diff="$(git diff --color=always)"
          if [ ! -z "${git_diff}" ]; then
            echo Please run "go mod tidy" and commit the changes
            echo "${git_diff}"

            exit 1
          fi
